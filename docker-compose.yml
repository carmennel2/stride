services:
  app:
    build: .
    image: stride:local
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FLASK_ENV: production
      DATABASE_URL: sqlite:////home/stride/app/instance/stride.db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      # Persist the SQLite DB and per-user model pickles across restarts.
      - stride-instance:/home/stride/app/instance
    restart: unless-stopped

volumes:
  stride-instance:
