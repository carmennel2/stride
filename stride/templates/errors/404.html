{% extends "base.html" %}

{% block title %}Not found — Stride{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
      <p class="display-1 text-muted mb-2">404</p>
      <h1 class="h3 mb-3">Page not found</h1>
      <p class="text-muted mb-4">
        Either the URL is wrong, or this page belongs to another account.
      </p>
      <a class="btn btn-primary"
         href="{{ url_for('main.index') }}">Back to safety</a>
    </div>
  </div>
{% endblock %}
