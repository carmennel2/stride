{% if oauth_providers %}
  <div class="d-grid gap-2 mb-3">
    {% if 'google' in oauth_providers %}
      <a href="{{ url_for('oauth.oauth_login', provider='google') }}"
         class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92a8.78 8.78 0 0 0 2.68-6.62Z"/>
          <path fill="#34A853" d="M9 18a8.6 8.6 0 0 0 5.96-2.18l-2.92-2.26a5.4 5.4 0 0 1-8.04-2.84H.96v2.34A9 9 0 0 0 9 18Z"/>
          <path fill="#FBBC05" d="M3.96 10.72A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.28-1.72V4.94H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.06l3-2.34Z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.34l2.58-2.58A8.99 8.99 0 0 0 .96 4.94l3 2.34A5.36 5.36 0 0 1 9 3.58Z"/>
        </svg>
        <span>{{ verb }} with Google</span>
      </a>
    {% endif %}
    {% if 'microsoft' in oauth_providers %}
      <a href="{{ url_for('oauth.oauth_login', provider='microsoft') }}"
         class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <rect x="0" y="0" width="8" height="8" fill="#F25022"/>
          <rect x="10" y="0" width="8" height="8" fill="#7FBA00"/>
          <rect x="0" y="10" width="8" height="8" fill="#00A4EF"/>
          <rect x="10" y="10" width="8" height="8" fill="#FFB900"/>
        </svg>
        <span>{{ verb }} with Microsoft</span>
      </a>
    {% endif %}
    {% if 'facebook' in oauth_providers %}
      <a href="{{ url_for('oauth.oauth_login', provider='facebook') }}"
         class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#1877F2" d="M18 9a9 9 0 1 0-10.4 8.9v-6.3H5.3V9h2.3V7c0-2.3 1.4-3.5 3.4-3.5 1 0 2 .2 2 .2v2.2h-1.1c-1.1 0-1.5.7-1.5 1.4V9h2.5l-.4 2.6h-2.1V18A9 9 0 0 0 18 9Z"/>
        </svg>
        <span>{{ verb }} with Facebook</span>
      </a>
    {% endif %}
  </div>

  <div class="text-center text-muted small my-3 d-flex align-items-center gap-2">
    <span class="flex-grow-1 border-top"></span>
    <span>or</span>
    <span class="flex-grow-1 border-top"></span>
  </div>
{% endif %}
